# ═══════════════════════════════════════════════════════════════════
# Nginx reverse proxy para correos-cr-bridge
# Guardar en: /etc/nginx/sites-available/correos-bridge
# Enlazar:    ln -s /etc/nginx/sites-available/correos-bridge /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name _;  # sustituir por tu dominio si tienes (ej: bridge.paracarpinteros.com)

    # Logs
    access_log /var/log/nginx/correos-bridge.access.log;
    error_log  /var/log/nginx/correos-bridge.error.log;

    # Health check sin autenticación (para monitoreo)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Resto de endpoints (requieren API token en header)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para llamadas SOAP lentas
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
