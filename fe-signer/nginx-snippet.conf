# Pegar dentro del bloque server { ... } existente de panel.paracarpinteros.com
# (probablemente en /etc/nginx/sites-available/panel.paracarpinteros.com o similar)

location /sign {
    proxy_pass http://127.0.0.1:8089/sign;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    client_max_body_size 5M;
}

location /sign-health {
    proxy_pass http://127.0.0.1:8089/health;
    proxy_set_header Host $host;
}
