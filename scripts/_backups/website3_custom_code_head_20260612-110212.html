<script>
(function(){
  function fixEmptyForms(){
    document.querySelectorAll('form.o_searchbar_form').forEach(function(f){
      if(!f.querySelector('input.search-query, input.oe_search_box, input[name="search"]')){
        f.classList.remove('o_searchbar_form');
        f.classList.remove('s_searchbar_input');
        f.removeAttribute('data-snippet');
        f.removeAttribute('data-name');
      }
    });
  }
  function injectShopSearch(){
    var p=location.pathname.replace(/\/$/,'')||'/';if(p!=='/'&&p!=='/es'&&p!=='/shop'&&p.indexOf('/shop/category')!==0) return;
    if(document.getElementById('pc-shop-search')) return;
    var header = document.querySelector('header#top');
    if(!header) return;
    var bar = document.createElement('div');
    bar.id = 'pc-shop-search';
    bar.innerHTML = '<div class="pc-ss-container"><form class="pc-ss-form" action="/shop" method="get" role="search"><input type="search" name="search" class="pc-ss-input" placeholder="Buscar entre 1.300 productos: fresas, brocas, tornillos, herraje..." autocomplete="off" aria-label="Buscar productos"><button type="submit" class="pc-ss-btn" aria-label="Buscar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><span>Buscar</span></button></form><div class="pc-ss-quick"><span>Categorías rápidas:</span><a href="/shop/category/fresas-y-router-fresas-mango-12-1959">Router 1/2&quot;</a><a href="/shop/category/fresas-y-router-fresas-mango-14-1960">Router 1/4&quot;</a><a href="/shop/category/fresas-y-router-copiadoras-1955">Copiadoras</a><a href="/shop/category/maquinas-1888">CNC y máquinas</a><a href="/shop/category/accesorios-cortavidrios-toyo-1905">Cortavidrios Toyo</a><a href="/shop/category/medicion-y-sujecion-1887">Medición y sujeción</a></div></div>';
    header.parentNode.insertBefore(bar, header.nextSibling);
  }
  function enhanceLjSearch(){
    // Añade un botón ✕ "limpiar" dentro del buscador del shop (lj).
    if(location.pathname.indexOf('/shop')!==0) return;
    var term=new URLSearchParams(location.search).get('search')||'';
    document.querySelectorAll('.lj-sg').forEach(function(sg){
      var inp=sg.querySelector('.lj-si');
      if(!inp || sg.querySelector('.lj-clear')) return;
      // Odoo deja el campo vacío aunque haya búsqueda activa: mostrar el término.
      if(term && !inp.value) inp.value=term;
      var btn=document.createElement('button');
      btn.type='button';
      btn.className='lj-clear';
      btn.setAttribute('aria-label','Limpiar búsqueda');
      btn.title='Limpiar búsqueda';
      btn.textContent='✕';
      function sync(){ sg.classList.toggle('pc-has-text', !!inp.value.trim()); }
      btn.addEventListener('click', function(){
        inp.value='';
        sync();
        // Si hay una búsqueda activa en la URL, recargar el shop sin filtro.
        if(new URLSearchParams(location.search).get('search')){ location.href='/shop'; }
        else { inp.focus(); }
      });
      inp.addEventListener('input', sync);
      sg.appendChild(btn);
      sync();
    });
  }
  function enhanceConfirmation(){
    // En /shop/confirmation: mete el nº de pedido en el mensaje del botón de WhatsApp.
    if(location.pathname.indexOf('/shop/confirmation')!==0) return;
    var on=document.getElementById('order_name');
    if(!on) return;
    var mt=(on.textContent||'').match(/S\d{3,}/i);
    if(!mt) return;
    var pedido=mt[0];
    document.querySelectorAll('a[href*="wa.me"]').forEach(function(a){
      var msg='Hola, adjunto el comprobante de pago de mi pedido '+pedido+' en Paracarpinteros.';
      a.href=a.href.split('?')[0]+'?text='+encodeURIComponent(msg);
    });
  }
  function init(){fixEmptyForms(); injectShopSearch(); enhanceLjSearch(); enhanceConfirmation();}
  if(document.readyState !== 'loading'){init();}
  else{document.addEventListener('DOMContentLoaded', init);}
  setTimeout(init, 0);
  setTimeout(init, 200);
})();
</script>
