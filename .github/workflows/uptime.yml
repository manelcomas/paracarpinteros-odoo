name: Uptime monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Health check bridge (directo a VPS, salta Cloudflare)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
              --max-time 15 \
              --resolve panel.paracarpinteros.com:443:66.94.99.220 \
              -k \
              https://panel.paracarpinteros.com/health)
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              cat /tmp/body.txt
              exit 0
            fi
            sleep 10
          done
          echo "FALLO. Cuerpo último intento:"
          cat /tmp/body.txt
          exit 1

      - name: Verify panel HTML loads
        if: success()
        run: |
          BODY=$(curl -sS --max-time 15 \
            --resolve panel.paracarpinteros.com:443:66.94.99.220 \
            -k \
            https://panel.paracarpinteros.com/)
          if ! echo "$BODY" | grep -q "LA JUGUETERÍA"; then
            echo "HTML no contiene LA JUGUETERIA"
            exit 1
          fi
          echo "HTML OK"

      - name: Deep health (Odoo key viva)
        if: success()
        run: |
          STATUS=$(curl -sS -o /tmp/deep.txt -w "%{http_code}" \
            --max-time 20 \
            --resolve panel.paracarpinteros.com:443:66.94.99.220 \
            -k \
            https://panel.paracarpinteros.com/health/deep)
          echo "HTTP $STATUS"
          cat /tmp/deep.txt
          if [ "$STATUS" != "200" ]; then
            echo "Odoo no responde (API key expirada/revocada o Odoo caído)"
            exit 1
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Panel down - ${new Date().toISOString().slice(0,16)}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'monitoring'
            });
            const existing = issues.data.find(i => i.title.startsWith('Panel down'));
            const body = `Chequeo de uptime falló (panel caído o Odoo no responde — la API key de Odoo pudo expirar/revocarse).\n- Endpoints: https://panel.paracarpinteros.com/health y /health/deep\n- Revisar qué paso falló en los logs del run.\n- Hora: ${new Date().toISOString()}\n- Run: ${context.runId}\n[Ver logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: title, body: body, labels: ['monitoring','bug']
              });
            }
