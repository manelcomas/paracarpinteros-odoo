<script>
(function(){
  function isProductPage(){ return /^\/shop\/[^/]+/.test(location.pathname) && !location.pathname.includes('/cart') && !location.pathname.includes('/checkout'); }
  function isMobile(){ return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent); }
  function loadImg(src){ return new Promise((res,rej)=>{ var img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>res(img); img.onerror=rej; img.src=src; }); }
  function wrapText(ctx, text, maxWidth){
    var words = text.split(' '), lines=[], cur='';
    for(var i=0;i<words.length;i++){
      var test = cur ? cur+' '+words[i] : words[i];
      if(ctx.measureText(test).width > maxWidth && cur){ lines.push(cur); cur=words[i]; } else cur = test;
    }
    if(cur) lines.push(cur); return lines;
  }
  async function buildShareCard(imgEl, title, price, ref){
    var W=1080, H=1350;
    var c = document.createElement('canvas'); c.width=W; c.height=H;
    var ctx = c.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    try {
      var pimg = await loadImg(imgEl.src);
      var pad=70, availW=W-pad*2, availH=820;
      ctx.fillStyle='#F5F5F5'; ctx.fillRect(0,0,W,availH+pad);
      var scale = Math.min(availW/pimg.width, availH/pimg.height);
      var w=pimg.width*scale, h=pimg.height*scale;
      ctx.drawImage(pimg, (W-w)/2, pad+(availH-h)/2, w, h);
    } catch(e){}
    var bandY=890;
    var grd=ctx.createLinearGradient(0,bandY,W,H);
    grd.addColorStop(0,'#FF6B1A'); grd.addColorStop(1,'#E5550F');
    ctx.fillStyle=grd; ctx.fillRect(0,bandY,W,H-bandY);
    ctx.textBaseline='top';
    ctx.fillStyle='#fff';
    if(ref){ctx.save();ctx.font='bold 28px -apple-system, sans-serif';var __tw=ctx.measureText(ref).width;var __pw=__tw+32;var __ph=48;var __pX=W-40-__pw;var __pY=40;ctx.fillStyle='#FF6B1A';ctx.fillRect(__pX,__pY,__pw,__ph);ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.textAlign='left';ctx.fillText(ref,__pX+16,__pY+__ph/2);ctx.restore();}
ctx.font='bold 40px -apple-system, Montserrat, sans-serif';
    var ct = title.replace(/\s+/g,' ').trim();
    if(ct.length>90) ct = ct.substring(0,87)+'...';
    var lines = wrapText(ctx, ct, W-140).slice(0,2);
    lines.forEach((l,i)=>ctx.fillText(l, 70, bandY+50+i*50));
    ctx.font='bold 22px -apple-system, sans-serif';
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.fillText('PRECIO', 70, bandY+175);
    ctx.font='bold 90px -apple-system, Montserrat, sans-serif';
    ctx.fillStyle='#fff';
    ctx.fillText(price||'—', 70, bandY+205);
    var linkY=H-120;
    ctx.fillStyle='#fff'; ctx.fillRect(40,linkY,W-80,80);
    ctx.fillStyle='#1A1A1A';
    ctx.font='bold 34px -apple-system, Montserrat, sans-serif';
    ctx.textAlign='center';
    ctx.fillText('👉 paracarpinteros.com', W/2, linkY+22);
    ctx.textAlign='left';
    return new Promise(res=>c.toBlob(b=>res(b), 'image/png', 0.92));
  }
  function showToast(html, ms){
    var t = document.getElementById('ljToast');
    t.innerHTML = html; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), ms||3500);
  }
  async function copyImg(blob){
    if(!navigator.clipboard || !window.ClipboardItem) return false;
    try { await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]); return true; }
    catch(e){ return false; }
  }
  function openModal(){ document.getElementById('ljBackdrop').classList.add('show'); }
  function closeModal(){ document.getElementById('ljBackdrop').classList.remove('show'); }

  function setup(){
    if(isProductPage()) document.body.classList.add('lj-has-product');
    var btn = document.getElementById('ljShareBtn');
    var backdrop = document.getElementById('ljBackdrop');
    var closeBtn = document.getElementById('ljCloseBtn');
    var optsEl = document.getElementById('ljOpts');
    var previewEl = document.getElementById('ljPreview');
    if(!btn) return;

    backdrop.addEventListener('click', closeModal);
    closeBtn.addEventListener('click', closeModal);

    btn.addEventListener('click', async function(){
      btn.disabled = true;
      var title = ((document.querySelector('h1')||{}).textContent||document.title).trim();
      var priceEl = document.querySelector('.product_price, .oe_price .oe_currency_value, [itemprop="price"]');
      var price = priceEl ? priceEl.textContent.trim() : '';
      var img = document.querySelector('.product_detail_img, #o-carousel-product img, .o_wsale_product_images img, [itemprop="image"], .product-primary-image img, .o_wsale_product_main_image img');
      if(!img) img = document.querySelector('img[src*="/web/image/product"]');

      var blob = null;
      try { if(img) blob = await buildShareCard(img, title, price, (function(){var rEl=document.querySelector('p.text-muted');return (rEl && /Ref/i.test(rEl.textContent)) ? rEl.textContent.trim() : '';})()); } catch(e){}

      previewEl.innerHTML = '';
      if(blob){
        var fr = new FileReader();
        fr.onload = e=>previewEl.innerHTML = '<img src="'+e.target.result+'" alt="">';
        fr.readAsDataURL(blob);
      }

      optsEl.innerHTML = '';

      // OPCIÓN 1: Copiar imagen (recomendada — solo imagen, sin texto)
      var o1 = document.createElement('button');
      o1.className='lj-opt';
      o1.innerHTML='<div class="lj-opt-ic bg-orange">📋</div><div class="lj-opt-txt"><b>Copiar imagen</b><span>'+(isMobile()?'Mantené presionada y pegala en tu chat':'Pegá con Ctrl+V en WhatsApp Web, Messenger, email…')+'</span></div><span class="lj-opt-arrow">›</span>';
      o1.onclick = async ()=>{
        closeModal();
        var ok = blob ? await copyImg(blob) : false;
        if(ok) showToast('<span style="font-size:26px">📋</span><span><b style="color:#FF6B1A">¡Imagen copiada!</b><br>Presioná Ctrl+V en el chat</span>', 4500);
        else showToast('<span style="font-size:26px">⚠️</span><span>No se pudo copiar.<br>Probá con "Compartir"</span>', 3500);
      };
      optsEl.appendChild(o1);

      // OPCIÓN 2: Menú compartir nativo (solo imagen, sin texto ni URL)
      if(navigator.share && blob){
        var file = new File([blob], 'producto.png', {type:'image/png'});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          var o2 = document.createElement('button');
          o2.className='lj-opt';
          o2.innerHTML='<div class="lj-opt-ic bg-blue">📤</div><div class="lj-opt-txt"><b>Compartir con app</b><span>'+(isMobile()?'Elegí la app que quieras':'Abre menú de Windows con apps disponibles')+'</span></div><span class="lj-opt-arrow">›</span>';
          o2.onclick = async ()=>{
            closeModal();
            try { await navigator.share({files:[file]}); } catch(e){}
          };
          optsEl.appendChild(o2);
        }
      }

      // OPCIÓN 3: Descargar imagen (backup)
      var o3 = document.createElement('button');
      o3.className='lj-opt';
      o3.innerHTML='<div class="lj-opt-ic bg-blue">💾</div><div class="lj-opt-txt"><b>Descargar imagen</b><span>Guardala y compartila después</span></div><span class="lj-opt-arrow">›</span>';
      o3.onclick = ()=>{
        closeModal();
        if(!blob) return;
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'producto.png';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
      };
      optsEl.appendChild(o3);

      openModal();
      btn.disabled = false;
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setup);
  else setup();
})();
</script>

<script id="pc-preserve-search">
/* PC-PRESERVE-SEARCH: mantiene ?search= al cambiar de categoría en /shop */
(function(){
  function rewrite(){
    var url = new URL(window.location.href);
    var search = url.searchParams.get('search');
    var order  = url.searchParams.get('order');
    var price  = url.searchParams.get('min_price');
    var pmax   = url.searchParams.get('max_price');
    if(!search && !order && !price && !pmax) return;
    var links = document.querySelectorAll('a[href*="/shop/category/"], a[href="/shop"]');
    links.forEach(function(a){
      try{
        var h = new URL(a.href, window.location.origin);
        if(search) h.searchParams.set('search', search);
        if(order)  h.searchParams.set('order', order);
        if(price)  h.searchParams.set('min_price', price);
        if(pmax)   h.searchParams.set('max_price', pmax);
        a.href = h.toString();
      }catch(e){}
    });
  }
  function init(){
    rewrite();
    /* Re-aplicar tras cargas dinámicas (Odoo a veces re-renderiza) */
    var obs = new MutationObserver(function(){rewrite();});
    obs.observe(document.body, {childList:true, subtree:true});
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  }else{
    init();
  }
})();
</script>

<script id="pc-sku-jsonld">
/* PC-SKU-JSONLD: anade sku al JSON-LD Product leyendo el "Ref:" nativo de la ficha */
(function(){
  function addSku(){
    if(!/^\/shop\/[^/]+/.test(location.pathname) || location.pathname.indexOf('/shop/category')===0) return;
    var ref=null;
    document.querySelectorAll('p.text-muted').forEach(function(p){
      var m=p.textContent.match(/^\s*Ref:\s*(\S+)\s*$/);
      if(m) ref=m[1];
    });
    if(!ref) return;
    document.querySelectorAll('script[type="application/ld+json"]').forEach(function(s){
      try{
        var data=JSON.parse(s.textContent);
        var arr=Array.isArray(data)?data:[data];
        var cambiado=false;
        arr.forEach(function(o){
          if(o && o['@type']==='Product' && !o.sku){ o.sku=ref; cambiado=true; }
        });
        if(cambiado) s.textContent=JSON.stringify(data);
      }catch(e){}
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', addSku);
  else addSku();
})();
</script>
