services:
  bridge:
    build: .
    container_name: correos-cr-bridge
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"  # solo local, nginx hace proxy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
