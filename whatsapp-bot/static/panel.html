<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBFBFA">
<title>WhatsApp Bot · Paracarpinteros</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/pwa/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/pwa/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WA Bot">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/static/panel.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="topbar">
      <div class="conv-avatar topbar-avatar">P</div>
      <div class="logo">Paracarpinteros</div>
      <span class="badge" id="hoursBadge">·</span>
      <button class="meta-chip loading" id="metaChip" onclick="openMetaDrawer()" title="Estado de la cuenta WhatsApp · click para detalle y control">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <span class="meta-label">Cuenta</span>
      </button>
      <button class="btn-out btn-secondary" id="notifBtn" onclick="togglePushSubscription()" title="Notificaciones del panel" style="display:none">
        <svg class="ico-bell-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><path d="m1 1 22 22"/>
        </svg>
        <svg class="ico-bell-on" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <svg class="ico-bell-blocked" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </button>
      <button class="btn-out btn-secondary" onclick="openNewContactDrawer()" title="Añadir nuevo contacto / lead">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
      </button>
      <button class="btn-out btn-secondary" onclick="openMetaDrawer()" title="Salud del número en Meta">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      </button>
      <button class="btn-out btn-secondary" onclick="openKnowledgeDrawer()" title="Conocimientos del bot">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
      <button class="btn-out btn-secondary" onclick="openBackupsModal()" title="Backups">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>
        </svg>
      </button>
      <button class="btn-out btn-secondary" onclick="doLogout()" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
      <button class="btn-out topbar-menu-toggle" onclick="toggleTopbarMenu(event)" title="Más opciones" aria-label="Menú">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>
    <div class="topbar-menu" id="topbarMenu">
      <button onclick="openNewContactDrawer();closeTopbarMenu()">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
        </span> Nuevo contacto
      </button>
      <button onclick="togglePushSubscription();closeTopbarMenu()" id="menuNotifBtn" style="display:none">
        <span class="menu-icon">
          <svg class="ico-bell-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><path d="m1 1 22 22"/>
          </svg>
          <svg class="ico-bell-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <svg class="ico-bell-blocked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </span> Notificaciones
      </button>
      <div class="menu-sep"></div>
      <button onclick="openMetaDrawer();closeTopbarMenu()">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </span> Estado de la cuenta
      </button>
      <button onclick="openKnowledgeDrawer();closeTopbarMenu()">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </span> Conocimientos del bot
      </button>
      <button onclick="openBackupsModal();closeTopbarMenu()">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
        </span> Backups
      </button>
      <div class="menu-sep"></div>
      <button class="danger" onclick="doLogout()">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </span> Cerrar sesión
      </button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="status-tabs" id="statusTabs"></div>
    <div class="search">
      <input id="searchInput" placeholder="Buscar por nombre o teléfono…" oninput="renderConvs()">
    </div>
    <div class="conv-list" id="convList"></div>
  </aside>

  <main class="main" id="main">
    <button type="button" class="mobile-pill" id="mobilePill" onclick="closeChat()" aria-label="Volver a la lista de chats"></button>
    <div class="empty" id="empty">
      <span class="emoji" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <h3>Seleccioná una conversación</h3>
      <p>Las nuevas aparecerán automáticamente arriba.</p>
    </div>
    <div class="chat-head" id="chatHead" style="display:none">
      <button class="back-btn" onclick="closeChat()" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div style="flex:1; min-width:0">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap">
          <div class="name" id="chatName" onclick="openPartnerDrawer()" title="Ver ficha del cliente">—</div>
          <button id="chatStatusBadge" class="status-badge sb-nuevo" onclick="openStatusMenu(event)" title="Click para cambiar el estado">·</button>
          <div id="statusMenu" class="status-menu" onclick="event.stopPropagation()"></div>
        </div>
        <div class="phone" id="chatPhone">—</div>
        <div id="partnerInfo" style="font-size:.7rem; color:var(--text-2); margin-top:4px; display:none"></div>
      </div>
      <button class="action-btn" onclick="openPartnerDrawer()" title="Ver ficha completa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        Cliente
      </button>
    </div>
    <div class="action-banner" id="actionBanner"></div>
    <div class="chat-body" id="chatBody" style="display:none"></div>
    <div class="chat-foot" id="chatFoot" style="display:none">
      <textarea id="replyText" placeholder="Escribí un mensaje…" rows="1" onkeydown="onReplyKey(event)" onpaste="onReplyPaste(event)"></textarea>
      <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="onImgFileChosen(event)">
      <button onclick="document.getElementById('imgFileInput').click()" id="attachBtn" title="Adjuntar imagen" aria-label="Adjuntar imagen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button onclick="sendReply()" id="sendBtn" title="Enviar (Enter)" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </main>
</div>

<script src="/static/panel.js"></script>
</body></html>
