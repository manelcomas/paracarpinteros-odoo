# Limitar tamaño de body (XMLs facturas raramente pasan de 200KB; .p12 ~6KB)
LimitRequestBody 5242880

# Forzar URLs limpias /sign y /health (sin .php).
# Las reglas van dentro de <Directory> para que el RewriteEngine se aplique
# al contexto del vhost (en server-scope no se hereda automaticamente).
<IfModule mod_rewrite.c>
    <Directory /var/www/html>
        RewriteEngine On
        RewriteRule ^sign$    /sign.php   [L]
        RewriteRule ^health$  /health.php [L]
        # Buzón Recepción: /buzon-rx/<endpoint> → /buzon-rx/<endpoint>.php
        # (necesario porque el redirect_uri de Google es sin extensión .php)
        RewriteRule ^buzon-rx/([a-z-]+)$ /buzon-rx/$1.php [L]
    </Directory>
</IfModule>

# Esconder banners
ServerTokens Prod
ServerSignature Off